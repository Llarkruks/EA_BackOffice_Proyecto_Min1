<aside class="sidebar">
  <nav class="sidebar__nav">
    @for (type of types(); track type.value) {
      <button
        type="button"
        class="sidebar__item"
        [class.sidebar__item--active]="selectedType() === type.value"
        (click)="selectType(type.value)"
      >
        {{ type.label }}
      </button>
    }
  </nav>
</aside>
