@if (open()) {
  <div class="modal-backdrop" (click)="onClose()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal__header">
        <h2>{{ title() }}</h2>
        <button type="button" class="modal__close" [disabled]="saving()" (click)="onClose()">×</button>
      </div>

      <div class="modal__body">
        <label class="form-field">
          <span>Title</span>
          <input type="text" [ngModel]="form().title" (ngModelChange)="onTextFieldChange('title', $event)" />
        </label>

        <label class="form-field">
          <span>Description</span>
          <textarea [ngModel]="form().description" (ngModelChange)="onTextFieldChange('description', $event)"></textarea>
        </label>

        <label class="form-field">
          <span>Point ID</span>
          <input type="text" [ngModel]="form().pointId" (ngModelChange)="onTextFieldChange('pointId', $event)" />
        </label>
      </div>

      <div class="modal__footer">
        <button type="button" class="btn btn--secondary" [disabled]="saving()" (click)="onClose()">Cancel</button>

        <button type="button" class="btn btn--primary" [disabled]="saving()" (click)="onSubmit()">
          {{ saving() ? 'Saving...' : (isEditing() ? 'Save changes' : 'Create question') }}
        </button>
      </div>
    </div>
  </div>
}
