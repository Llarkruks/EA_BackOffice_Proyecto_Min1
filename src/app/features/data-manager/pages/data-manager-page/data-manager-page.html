<div class="page">
  <app-sidebar
    [selectedType]="selectedType()"
    [types]="typeOptions"
    (typeChange)="onTypeChange($event)"
  />

  <section class="page__content">
    <div class="page__card">
      @if (showSearch()) {
        <div class="page__toolbar">
          <div class="searchbar">
            <input
              class="searchbar__input"
              type="text"
              [placeholder]="searchPlaceholder()"
              [value]="searchTerm()"
              (input)="onSearchInput($event)"
            />

            @if (searchTerm().trim()) {
              <button
                class="searchbar__button"
                type="button"
                (click)="clearSearch()"
              >
                Clear
              </button>
            }
          </div>
        </div>
      }

      @if (loading()) {
        <div class="page__loading">Loading...</div>
      } @else {
        <app-pagination
          [page]="page()"
          [limit]="limit()"
          [total]="total()"
          [totalPages]="totalPages()"
          (pageChange)="onPageChange($event)"
          (limitChange)="onLimitChange($event)"
        />

        <app-data-table
          [items]="items()"
          [previewColumns]="currentPreviewColumns()"
          [selectedIds]="selectedIds()"
          (deleteItem)="onDeleteItem($event)"
          (deleteMany)="onDeleteMany($event)"
          (toggleEnabled)="onToggleEnabled($event)"
          (selectedIdsChange)="onSelectedIdsChange($event)"
        />
      }
    </div>
  </section>
</div>
