@if (loading()) {
  <div class="data-manager-page__loading">Loading...</div>
} @else {
  <section class="data-manager-page">
    <app-sidebar
      [selectedType]="selectedType()"
      [types]="typeOptions"
      (typeChange)="onTypeChange($event)"
    />

    <div class="data-manager-page__content">
      <app-search-bar
        class="data-manager-page__search"
        [placeholder]="searchPlaceholder()"
        [value]="searchTerm()"
        [searching]="searching()"
        (valueChange)="onSearchTermChange($event)"
      />

      <app-pagination
        [page]="page()"
        [limit]="limit()"
        [total]="total()"
        [totalPages]="totalPages()"
        (pageChange)="onPageChange($event)"
        (limitChange)="onLimitChange($event)"
      />

      <app-data-table
        class="data-manager-page__table"
        [items]="items()"
        [previewColumns]="currentPreviewColumns()"
        [actionConfig]="currentActionConfig()"
        [editableFields]="currentEditableFields()"
        [selectedIds]="selectedIds()"
        [canAddItem]="canAddCurrentType()"
        [addButtonLabel]="addButtonLabel()"
        [inlineEditSavingItemId]="inlineEditSavingItemId()"
        [inlineEditCompletedItemId]="inlineEditCompletedItemId()"
        (selectedIdsChange)="onSelectedIdsChange($event)"
        (deleteItem)="onDeleteItem($event)"
        (deleteMany)="onDeleteMany($event)"
        (toggleEnabled)="onToggleEnabled($event)"
        (addItemClick)="onOpenAddItem()"
        (inlineEditSubmit)="onInlineEditSubmit($event)"
      />
    </div>
  </section>

  <app-user-form-modal
    [open]="showUserModal()"
    [title]="modalTitle()"
    [form]="userForm()"
    [saving]="savingUser()"
    [isEditing]="isEditingUser()"
    (close)="onCloseUserModal()"
    (submit)="onSubmitUser()"
    (fieldChange)="onUserFieldChange($event.key, $event.value)"
  />

  <app-route-form-modal
    [open]="showRouteModal()"
    [title]="routeModalTitle()"
    [form]="routeForm()"
    [saving]="savingRoute()"
    [isEditing]="isEditingRoute()"
    (close)="onCloseRouteModal()"
    (submit)="onSubmitRoute()"
    (fieldChange)="onRouteFieldChange($event.key, $event.value)"
  />

  <app-point-form-modal
    [open]="showPointModal()"
    [title]="pointModalTitle()"
    [form]="pointForm()"
    [saving]="savingPoint()"
    [isEditing]="isEditingPoint()"
    (close)="onClosePointModal()"
    (submit)="onSubmitPoint()"
    (fieldChange)="onPointFieldChange($event.key, $event.value)"
  />

  <app-question-form-modal
    [open]="showQuestionModal()"
    [title]="questionModalTitle()"
    [form]="questionForm()"
    [saving]="savingQuestion()"
    [isEditing]="isEditingQuestion()"
    (close)="onCloseQuestionModal()"
    (submit)="onSubmitQuestion()"
    (fieldChange)="onQuestionFieldChange($event.key, $event.value)"
  />
}
